<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Nabung</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>💰 Aplikasi Nabung</h1>

<a href="/logout" class="logout">Logout</a>

<form action="/tambah" method="POST" class="form-box">
    <input type="text" name="nama" placeholder="Nama Tabungan" required>
    <input type="number" name="target" placeholder="Target (Rp)" required>
    <button>Tambah</button>
</form>

<div class="container">
{% for t in tabungan %}
<div class="card">

    <h3>{{ t[1] }}</h3>

    <p>Target: Rp {{ t[2] }}</p>
    <p>Terkumpul: Rp {{ t[3] }}</p>

    {% set persen = (t[3] / t[2] * 100) if t[2] else 0 %}

    <div class="progress">
        <div class="bar" style="width: {{ persen }}%"></div>
    </div>

    <p>{{ "%.1f"|format(persen) }}%</p>

    <form action="/nabung/{{ t[0] }}" method="POST">
        <input type="number" name="jumlah" placeholder="Jumlah nabung" required>
        <button>Nabung</button>
    </form>

    <a href="/riwayat/{{ t[0] }}" class="btn-riwayat">📜 Riwayat</a>
    <a href="/hapus/{{ t[0] }}" class="hapus">❌ Hapus</a>

</div>
{% endfor %}
</div>

</body>
</html>
